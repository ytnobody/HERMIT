name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION="v0.1.0"
          else
            MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
            NEXT_PATCH=$((PATCH + 1))
            NEXT_VERSION="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
          fi
          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${NEXT_VERSION}"

      - name: Build binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p dist

          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags "-X main.Version=${VERSION}" -o dist/hermit-linux-amd64   ./cmd/hermit
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -ldflags "-X main.Version=${VERSION}" -o dist/hermit-linux-arm64   ./cmd/hermit
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -ldflags "-X main.Version=${VERSION}" -o dist/hermit-darwin-amd64  ./cmd/hermit
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags "-X main.Version=${VERSION}" -o dist/hermit-darwin-arm64  ./cmd/hermit
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "-X main.Version=${VERSION}" -o dist/hermit-windows-amd64.exe ./cmd/hermit

      - name: Create tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Generate SHA256 checksums
        run: |
          cd dist
          for f in hermit-linux-amd64 hermit-linux-arm64 hermit-darwin-amd64 hermit-darwin-arm64 hermit-windows-amd64.exe; do
            sha256sum "$f" | sed 's|'"$f"'|hermit|' > "${f}.sha256"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            --generate-notes \
            --title "Release ${{ steps.version.outputs.version }}" \
            dist/hermit-linux-amd64 \
            dist/hermit-linux-amd64.sha256 \
            dist/hermit-linux-arm64 \
            dist/hermit-linux-arm64.sha256 \
            dist/hermit-darwin-amd64 \
            dist/hermit-darwin-amd64.sha256 \
            dist/hermit-darwin-arm64 \
            dist/hermit-darwin-arm64.sha256 \
            dist/hermit-windows-amd64.exe \
            dist/hermit-windows-amd64.exe.sha256
