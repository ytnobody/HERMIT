version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - os.Chdir
        - os.Remove
        - os.Chmod
        - os.MkdirAll
        - os.WriteFile
        - (*os.File).Close
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Println
        - (*bufio.Writer).Flush
        - (*bytes.Buffer).ReadFrom
    govet:
      enable-all: false

formatters:
  enable:
    - gofmt

run:
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
